<body>
    <div class="container">
        <h1>check if the numer is palindrome</h1>
        <input type="text" id="cheker">
        <h1 id="yup"></h1>
        <button onclick="myfunc()">click to check</button>
    </div>
    <script>
        function myfunc() {
            let a = document.getElementById("cheker").value;
            let str = a.toString();
            let reverse = str.split("").reverse().join("");
            if (a === "") {
                document.getElementById("yup").innerText = "Give value first ❗";
                document.getElementById("yup").style.color = "#FACC15";
                box.style.backgroundColor = "rgba(239,68,68,0.4)";
            }
            else if (reverse === str) {
                document.getElementById("yup").innerText = "Yes, it is a Palindrome ✅";
                document.getElementById("yup").style.color = "#22C55E";
                box.style.backgroundColor = "rgba(34,197,94,0.3)";
            } else {
                document.getElementById("yup").innerText = "No, it is NOT ❌";
                document.getElementById("yup").style.color = "#EF4444";
                box.style.backgroundColor = "rgba(239,68,68,0.3)";
            }


        }

    </script>
